.pv-card{ display:flex; align-items:flex-start; gap:10px; background:#fdf6ef; border:1px solid #f3e0c8; border-radius:15px; padding:13px 14px; margin-bottom:12px }
.pv-card>svg{ flex:none; color:#b58324; margin-top:2px }
.pv-card.ok{ background:#f2faf6; border-color:#d6ece1 } .pv-card.ok>svg{ color:var(--brand) }
.pv-tx{ flex:1 } .pv-tx b{ display:block; font-size:13.5px } .pv-tx span{ display:block; font-size:11.5px; color:var(--ink-2); margin-top:3px; line-height:1.5 }
.pv-card .mini-btn{ flex:none; align-self:center }
/* 雷萌萌静音钮 */
.pet__mute{ position:absolute; top:-4px; right:-4px; width:24px; height:24px; border-radius:50%; border:1px solid var(--line); background:#fff; color:var(--brand-ink); display:grid; place-items:center; cursor:pointer; box-shadow:0 3px 9px rgba(30,42,36,.18); z-index:2 }
.pet__mute.off{ color:var(--ink-3) }
.pet__mute.off::after{ content:""; position:absolute; width:15px; height:2px; background:#c65a5a; transform:rotate(-45deg); border-radius:2px }
/* 专注分心暂存 */
.fx-cap{ display:flex; gap:8px; width:min(320px,84%); margin:14px auto 0 }
.fx-cap input{ flex:1; border:1.5px solid var(--line); background:#fff; border-radius:13px; padding:11px 13px; font:inherit; font-size:13px; outline:0 }
.fx-cap input:focus{ border-color:rgba(43,147,124,.4) }
.fx-cap button{ flex:none; width:42px; border:0; border-radius:13px; cursor:pointer; color:#fff; background:linear-gradient(135deg,var(--brand-2),var(--brand)); display:grid; place-items:center }
/* 心力校准 */
.cal-out{ display:flex; align-items:center; gap:14px; background:#f4faf7; border:1px solid #d6ece1; border-radius:15px; padding:14px 16px; margin:6px 0 14px }
.cal-out b{ font-family:var(--serif); font-size:38px; font-weight:500; color:var(--brand-ink); line-height:1 }
.cal-out span{ font-size:11.5px; color:var(--ink-2); line-height:1.55 }
/* 习惯旅程 */
.hjourney{ background:#fff; border:1px solid var(--line-2); border-radius:18px; padding:16px; margin-bottom:12px; box-shadow:var(--sh-1) }
.hj-top{ display:flex; align-items:center; justify-content:space-between }
.hj-top b{ font-size:15.5px }
.hj-phase{ font-size:10.5px; font-weight:800; padding:4px 9px; border-radius:8px; background:#fbf3e2; color:#b58324 }
.hj-phase.deep{ background:#e8f5ef; color:var(--brand-ink) }
.hj-sub{ font-size:12px; color:var(--ink-3); margin-top:5px } .hj-sub b{ color:var(--brand-ink); font-size:13px }
.hj-bar{ position:relative; height:7px; border-radius:4px; background:rgba(30,42,36,.07); margin:11px 0 7px; overflow:visible }
.hj-bar .fill{ display:block; height:100%; border-radius:4px; background:linear-gradient(90deg,var(--brand-2),var(--brand)); transition:width .5s var(--ease) }
.hj-bar .mark{ position:absolute; top:-3px; width:2px; height:13px; border-radius:2px; background:#c9a24b }
.hj-legend{ display:flex; justify-content:space-between; font-size:10px; color:var(--ink-3); font-weight:600 }
.hj-today{ display:flex; align-items:center; justify-content:center; gap:7px; width:100%; margin-top:12px; border:0; cursor:pointer; font:inherit; font-size:13px; font-weight:800; padding:11px; border-radius:13px; color:#fff;
  background:linear-gradient(135deg,var(--brand-2),var(--brand)); box-shadow:0 5px 14px -4px rgba(43,147,124,.4) }
.hj-today.done{ background:#eef6f1; color:var(--brand-ink); box-shadow:none; cursor:default }
/* 习惯建立器 */
.hcurve{ background:#fff; border:1px solid var(--line-2); border-radius:16px; padding:14px 14px 10px; margin-bottom:16px; box-shadow:var(--sh-1) }
.hc-head{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:800; margin-bottom:10px; color:var(--ink) }
.hc-cap{ font-size:11.5px; color:var(--ink-2); line-height:1.6; padding-top:8px } .hc-cap b{ color:var(--brand-ink) }
.hmodes{ display:flex; flex-direction:column; gap:8px }
.hmode{ text-align:left; border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:12px 14px; cursor:pointer; font:inherit; transition:.18s }
.hmode b{ display:block; font-size:14px } .hmode span{ display:block; font-size:11.5px; color:var(--ink-3); margin-top:3px }
.hmode.on{ border-color:transparent; background:linear-gradient(150deg,#f1f8f5,#e5f2eb); box-shadow:inset 0 0 0 1.5px rgba(43,147,124,.35) }
.hmode.on b{ color:var(--brand-ink) }
.hsummary{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--ink-2); background:#f7faf8; border:1px solid var(--line-2); border-radius:12px; padding:11px 13px; margin:2px 0 14px }
.hsummary b{ color:var(--brand-ink) }
.late-card{ display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fdf6ef; border:1px solid #f3e0c8; border-radius:15px; padding:12px 14px; margin-bottom:12px }
.late-card .lc-tx b{ display:flex; align-items:center; gap:6px; font-size:13.5px; color:#b58324 }
.late-card .lc-tx span{ display:block; font-size:11.5px; color:var(--ink-3); margin-top:3px }
.late-card .lc-acts{ display:flex; flex-direction:column; gap:6px; flex:none }
.late-card .lc-acts button{ cursor:pointer; font:inherit; font-size:12px; font-weight:700; padding:8px 12px; border-radius:10px; background:#fff; color:var(--ink-2); border:1px solid var(--line) }
.late-card .lc-acts button.pri{ background:linear-gradient(135deg,var(--brand-2),var(--brand)); color:#fff; border:0 }
.alldone{ text-align:center; background:linear-gradient(160deg,#f2faf6,#e9f5ef); border:1px solid #d6ece1; border-radius:18px; padding:26px 18px }
.alldone>svg{ color:var(--brand) }
.alldone b{ display:block; font-size:16px; margin-top:8px }
.alldone span{ display:block; font-size:12.5px; color:var(--ink-3); margin-top:5px }
.alldone>div{ margin-top:14px; display:flex; justify-content:center }
.ddl{ display:inline-flex; align-items:center; gap:3px; font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:7px; background:rgba(30,42,36,.05); color:var(--ink-3); white-space:nowrap }
.ddl>svg{ opacity:.7 }
.ddl.near{ background:#fbf3e2; color:#b58324 } .ddl.near>svg{ opacity:1 }
.ddl.soon{ background:#fdeee9; color:#c9694f } .ddl.soon>svg{ opacity:1 }
.ddl.over{ background:#de6e6e; color:#fff } .ddl.over>svg{ opacity:1 }
.badge{ font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px }
.badge.roll{ background:#fff4ec; color:#c9784a }
.badge.crit{ background:#eaf6f1; color:var(--brand-ink) }
.badge.lock{ background:#eef0f8; color:#5a68b0 }
.dom{ font-size:11px;font-weight:700; display:inline-flex;align-items:center;gap:5px }
.postpone{ font-size:11.5px;font-weight:700;color:var(--ink-3); background:rgba(35,48,41,.05);
  border:0;border-radius:10px;padding:8px 10px;cursor:pointer; flex:none; transition:.15s }
.postpone:active{ transform:scale(.94) }

/* ============ SEGMENTED ============ */
.seg{ display:flex; background:rgba(35,48,41,.05); border-radius:14px; padding:4px; margin:2px 0 4px }
.seg button{ flex:1; border:0;background:none;font:inherit;font-size:13px;font-weight:700;color:var(--ink-3);
  padding:9px; border-radius:11px; cursor:pointer; transition:.2s }
.seg button.on{ background:#fff; color:var(--ink); box-shadow:var(--sh-1) }

/* ============ DEPENDENCY BOARD ============ */
.chain{ position:relative; padding-left:6px }
.node{ position:relative; display:flex; gap:14px; padding-bottom:16px }
.node:last-child{ padding-bottom:0 }
.rail{ position:relative; flex:none; width:34px; display:flex; flex-direction:column; align-items:center }
.rail .knob{ width:34px;height:34px;border-radius:12px; display:grid;place-items:center; z-index:2;
  background:#fff; border:2px solid var(--line); box-shadow:var(--sh-1) }
.rail .knob svg{ width:16px;height:16px }
.node.done .knob{ background:var(--brand); border-color:var(--brand); color:#fff }
.node.crit .knob{ border-color:var(--brand); color:var(--brand-ink) }
.node.doing .knob{ border-color:var(--brand); background:#eaf6f1; color:var(--brand-ink) }
.rail .line{ position:absolute; top:34px; bottom:-16px; width:2.5px; background:var(--line);
  border-radius:2px }
.node.done .line, .node.crit .line{ background:linear-gradient(var(--brand),rgba(47,158,134,.35)) }
.node:last-child .line{ display:none }
.node .card2{ flex:1; background:var(--paper); border:1px solid var(--line-2); border-radius:var(--r-sm);
  padding:13px 14px; box-shadow:var(--sh-1) }
.node.crit .card2{ box-shadow:0 0 0 1.5px rgba(47,158,134,.28), var(--sh-1) }
.node .card2 .t{ font-size:13.5px;font-weight:700 }
.node .card2 .m{ display:flex;gap:7px;align-items:center;margin-top:6px;flex-wrap:wrap }
.critbar{ display:flex;align-items:center;gap:8px; background:#eaf6f1; border-radius:14px; padding:11px 14px;
  margin:2px 0 14px; font-size:12.5px;font-weight:700;color:var(--brand-ink) }

/* ============ HEAT CALENDAR ============ */
.cal{ }
.cal .wk{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:8px }
.cal .wd{ text-align:center; font-size:10.5px; font-weight:700; color:var(--ink-3) }
.cal .grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px }
.day{ aspect-ratio:1/1.08; border-radius:13px; position:relative; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px; cursor:pointer; border:1px solid var(--line-2);
  background:#fff; font-size:12.5px; font-weight:700; color:var(--ink-2); transition:transform .12s }
.day:active{ transform:scale(.94) }
.day.mut{ color:var(--ink-3); opacity:.5 }
.day.h1{ background:#f0f8f4 }
.day.h2{ background:#fdf3e9 }
.day.h3{ background:#fbe6db }
.day.h4{ background:#f6d9d5 }
.day .load{ display:flex; gap:2px }
.day .load i{ width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.35 }
.day.today{ box-shadow:0 0 0 2px var(--brand) }
.day .warn{ position:absolute; top:5px; right:6px; width:6px;height:6px;border-radius:50%;background:var(--z-red) }
.legend{ display:flex; gap:12px; justify-content:center; margin-top:14px; flex-wrap:wrap }
.legend span{ font-size:10.5px; color:var(--ink-3); font-weight:600; display:inline-flex;align-items:center;gap:5px }
.legend i{ width:12px;height:12px;border-radius:4px; display:inline-block }

/* ============ HABITS ============ */
.habit{ display:flex; align-items:center; gap:14px; background:var(--paper); border:1px solid var(--line-2);
  border-radius:var(--r); padding:15px; box-shadow:var(--sh-1); margin-bottom:11px }
.ring{ position:relative; width:52px;height:52px; flex:none }
.ring svg{ transform:rotate(-90deg) }
.ring .n{ position:absolute; inset:0; display:grid; place-items:center; font-size:13px; font-weight:800; color:var(--ink) }
.habit .body{ flex:1; min-width:0 }
.habit .t{ font-size:14.5px; font-weight:700 }
.habit .m{ display:flex; gap:6px; align-items:center; margin-top:6px; flex-wrap:wrap }
.habit .trig{ font-size:11px;font-weight:700; color:var(--ink-3); display:inline-flex;align-items:center;gap:4px }
.hb-check{ width:34px;height:34px;border-radius:12px;border:2px solid var(--line);flex:none;cursor:pointer;
  display:grid;place-items:center;background:#fff;transition:.2s }
.hb-check.on{ background:var(--brand);border-color:var(--brand) }
.hb-check svg{ width:16px;height:16px;color:#fff;opacity:0;transform:scale(.6);transition:.2s }
.hb-check.on svg{ opacity:1;transform:none }
.paused{ font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;background:#fff4ec;color:#c9784a }

/* ============ INSIGHTS: DONUT ============ */
.dial{ display:flex; align-items:center; gap:18px }
.donut{ position:relative; width:150px;height:150px; flex:none }
.donut svg{ transform:rotate(-90deg) }
.donut .mid{ position:absolute; inset:0; display:grid; place-items:center; text-align:center }
.donut .mid b{ font-family:var(--serif); font-size:30px; font-weight:500; color:var(--ink); line-height:1 }
.donut .mid small{ display:block; font-size:10.5px; color:var(--ink-3); font-weight:700; margin-top:4px; letter-spacing:.05em }
.leg{ flex:1; display:flex; flex-direction:column; gap:9px }
.leg .r{ display:flex; align-items:center; gap:8px; font-size:12.5px }
.leg .r b{ margin-left:auto; font-weight:700; color:var(--ink) }
.leg .r .nm{ font-weight:600; color:var(--ink-2) }
.warn-card{ display:flex; gap:12px; align-items:flex-start; background:#fdf6ec; border:1px solid #f2e2c4;
  border-radius:var(--r-sm); padding:14px; margin-top:14px }
.warn-card .ic{ width:32px;height:32px;border-radius:10px;background:#f7e6c3;display:grid;place-items:center;flex:none;color:#b58324 }
.warn-card p{ font-size:12.5px;line-height:1.55;color:#8a6a2e }

/* insight report */
.insight{ background:linear-gradient(160deg,#f3f8f5,#ffffff); border:1px solid var(--line-2);
  border-radius:var(--r-lg); padding:20px; box-shadow:var(--sh-1) }
.insight .lead{ font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--brand-ink) }
.insight h4{ font-size:17px; margin:10px 0; font-weight:800; line-height:1.4 }
.insight h4 em{ font-style:normal; background:linear-gradient(transparent 62%, rgba(240,156,134,.4) 0); }
.insight p{ font-size:13px;line-height:1.65;color:var(--ink-2); margin-bottom:8px }
.insight .stat{ display:flex; gap:10px; margin:14px 0 }
.insight .stat .b{ flex:1; background:#fff; border:1px solid var(--line-2); border-radius:14px; padding:12px; text-align:center }
.insight .stat .b .v{ font-family:var(--serif); font-size:22px; font-weight:500; color:var(--ink) }
.insight .stat .b .l{ font-size:10.5px; color:var(--ink-3); font-weight:700; margin-top:3px }

.trend{ margin-top:6px }
.trend svg{ width:100%; height:88px; overflow:visible }

/* menu list (experience entries) */
.mlist{ background:var(--paper); border:1px solid var(--line-2); border-radius:var(--r); box-shadow:var(--sh-1); overflow:hidden }
.mrow{ display:flex; align-items:center; gap:13px; padding:15px 16px; cursor:pointer; border-top:1px solid var(--line-2); transition:background .15s }
.mrow:first-child{ border-top:0 }
.mrow:active{ background:var(--paper-2) }
.mrow .ic{ width:38px;height:38px;border-radius:12px; display:grid;place-items:center; flex:none; color:#fff }
.mrow .tx{ flex:1 }
.mrow .tx b{ font-size:14px; font-weight:700; display:block }
.mrow .tx span{ font-size:11.5px; color:var(--ink-3) }
.mrow .cv{ color:var(--ink-3) }

/* ============ OVERLAY / SHEETS ============ */
#overlayRoot{ position:absolute; inset:0; z-index:80; pointer-events:none; }
.ov{ position:absolute; inset:0; display:flex; }
.backdrop{ position:absolute; inset:0; background:rgba(18,32,26,.44); backdrop-filter:blur(3px);
  opacity:0; transition:opacity .32s var(--ease) }
.ov.show{ pointer-events:auto }
.ov.show .backdrop{ opacity:1 }

.sheet{ position:absolute; left:0; right:0; bottom:0; max-height:92%; overflow-y:auto;
  background:#fbfbf9; border-radius:30px 30px 46px 46px; padding:10px 20px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(102%); transition:transform .42s var(--ease); box-shadow:0 -20px 50px rgba(20,40,32,.28) }
.ov.show .sheet{ transform:none }
.sheet::-webkit-scrollbar{ width:0 }
.grip{ width:40px;height:5px;border-radius:3px;background:rgba(35,48,41,.15); margin:8px auto 14px }
.sheet h2{ font-family:var(--serif); font-weight:500; font-size:22px; letter-spacing:-.01em; margin-bottom:4px }
.sheet h2.serif{ font-family:var(--serif); font-weight:500; font-size:23px }
.sheet .desc{ font-size:13px; color:var(--ink-2); line-height:1.55; margin-bottom:16px }

/* fullscreen modal (breathing/crisis) */
.full{ position:absolute; inset:0; transform:translateY(100%); transition:transform .45s var(--ease) }
.ov.show .full{ transform:none }

/* input */
.field{ background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:15px 16px; margin-bottom:12px }
.field label{ font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase }
.field input, .field textarea{ width:100%; border:0; outline:0; font:inherit; font-size:16px; font-weight:600;
  color:var(--ink); background:none; margin-top:7px; resize:none }
.prefill{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px }
.pf{ display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:12px; cursor:pointer;
  font-size:12.5px; font-weight:700; border:1.5px dashed var(--line); color:var(--ink-3); background:#fff; transition:.18s }
.pf.set{ border-style:solid; border-color:transparent; background:#eef6f2; color:var(--brand-ink) }

/* add path chooser */
.paths{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:6px }
.pathcard{ background:#fff; border:1px solid var(--line-2); border-radius:var(--r); padding:18px 16px; cursor:pointer;
  box-shadow:var(--sh-1); text-align:left; transition:transform .15s }
.pathcard:active{ transform:scale(.97) }
.pathcard .ic{ width:44px;height:44px;border-radius:14px;display:grid;place-items:center;margin-bottom:12px;color:#fff }
.pathcard b{ font-size:15px;font-weight:800; display:block }
.pathcard span{ font-size:11.5px;color:var(--ink-3); display:block; margin-top:4px; line-height:1.5 }

/* voice mic */
.mic-stage{ text-align:center; padding:12px 0 4px }
.mic-btn{ width:96px;height:96px;border-radius:50%;border:0;cursor:pointer;margin:6px auto 0;
  background:linear-gradient(145deg,var(--brand-2),var(--brand)); color:#fff; display:grid;place-items:center;
  box-shadow:var(--sh-fab); position:relative; transition:transform .2s }
.mic-btn:active{ transform:scale(.94) }
.mic-btn.rec{ animation:micpulse 1.2s ease-in-out infinite }
@keyframes micpulse{ 0%,100%{box-shadow:0 0 0 0 rgba(47,158,134,.5),var(--sh-fab)} 50%{box-shadow:0 0 0 18px rgba(47,158,134,0),var(--sh-fab)} }
.mic-btn svg{ width:38px;height:38px }
.wave{ display:flex; gap:4px; justify-content:center; align-items:center; height:26px; margin:16px 0 4px }
.wave i{ width:4px;border-radius:3px;background:var(--brand); height:8px; animation:wv 1s ease-in-out infinite }
.wave i:nth-child(2n){ animation-delay:.15s } .wave i:nth-child(3n){ animation-delay:.3s } .wave i:nth-child(4n){ animation-delay:.45s }
@keyframes wv{ 0%,100%{height:7px} 50%{height:24px} }
.transcript{ font-size:14.5px; font-weight:600; color:var(--ink); line-height:1.6; min-height:22px }
.parsing{ display:flex; align-items:center; gap:10px; justify-content:center; color:var(--brand-ink); font-weight:700; font-size:13px; padding:10px }
.spin{ width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(47,158,134,.25);border-top-color:var(--brand); animation:sp .7s linear infinite }
@keyframes sp{ to{transform:rotate(360deg)} }

/* preview cards */
.pcard{ background:#fff;border:1px solid var(--line-2);border-radius:var(--r-sm);padding:14px;box-shadow:var(--sh-1);margin-bottom:10px;
  opacity:0; transform:translateY(8px); animation:rise .5s var(--ease) forwards }
.pcard .top{ display:flex;align-items:center;gap:8px }
.pcard .t{ font-size:14px;font-weight:700 }
.pcard .lo{ font-size:11px;color:var(--ink-3);font-weight:600;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center }
.conf{ margin-left:auto; font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;background:#eaf6f1;color:var(--brand-ink) }
.conf.low{ background:#fdf1e6;color:#c9784a }
.subtasks{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:flex;flex-direction:column;gap:7px }
.subtasks .st{ display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2) }
.subtasks .st .mins{ font-size:10px;font-weight:800;background:rgba(35,48,41,.05);padding:2px 6px;border-radius:6px;color:var(--ink-3) }
.subtasks .st.ice .mins{ background:#eaf6f1;color:var(--brand-ink) }

/* stress test */
.qwrap{ }
.qprog{ display:flex; gap:6px; margin-bottom:16px }
.qprog i{ flex:1; height:4px; border-radius:2px; background:rgba(35,48,41,.1) }
.qprog i.on{ background:var(--brand) }
.qtext{ font-size:18px; font-weight:700; line-height:1.5; margin-bottom:20px; letter-spacing:.01em }
.opts{ display:flex; flex-direction:column; gap:10px }
.opt{ text-align:left; background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:15px 16px;
  font:inherit; font-size:14.5px; font-weight:600; color:var(--ink); cursor:pointer; transition:.18s; display:flex;align-items:center;gap:12px }
.opt:active{ transform:scale(.98) }
.opt .rd{ width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:none }
.opt.sel{ border-color:var(--brand); background:#eef6f2 }
.opt.sel .rd{ border-color:var(--brand); background:var(--brand); box-shadow:inset 0 0 0 3px #eef6f2 }

/* zone result */
.zoneres{ text-align:center; padding:6px 0 }
.zonering{ width:150px;height:150px;margin:8px auto 0; border-radius:50%; display:grid;place-items:center;
  background:conic-gradient(var(--zc) var(--zp), rgba(35,48,41,.07) 0); position:relative }
.zonering::before{ content:""; position:absolute; inset:14px; border-radius:50%; background:#fbfbf9 }
.zonering .in{ position:relative; text-align:center }
.zonering .in b{ font-family:var(--serif); font-size:34px; font-weight:500; display:block; line-height:1 }
.zonering .in span{ font-size:11px; font-weight:800; letter-spacing:.05em; color:var(--ink-3) }
.threed{ display:flex; gap:8px; margin:16px 0 }
.threed .b{ flex:1; background:#fff;border:1px solid var(--line-2);border-radius:13px;padding:11px;text-align:center }
.threed .b .v{ font-size:17px;font-weight:800 }
.threed .b .l{ font-size:10px;color:var(--ink-3);font-weight:700;margin-top:3px }
.disclaim{ font-size:11px; color:var(--ink-3); line-height:1.5; background:rgba(35,48,41,.04); border-radius:12px; padding:11px 13px; margin-top:8px; text-align:center }

/* deload plan */
.plan-item{ display:flex; gap:12px; align-items:flex-start; padding:13px 0; border-bottom:1px solid var(--line-2) }
.plan-item:last-child{ border-bottom:0 }
.plan-item .ic{ width:34px;height:34px;border-radius:11px;display:grid;place-items:center;flex:none;color:#fff }
.plan-item .tx b{ font-size:13.5px;font-weight:700;display:block }
.plan-item .tx span{ font-size:12px;color:var(--ink-2);line-height:1.5;display:block;margin-top:3px }
.promise{ display:flex;gap:10px;align-items:center; background:#eef6f2; border-radius:14px; padding:13px; margin:14px 0; font-size:12.5px;font-weight:600;color:var(--brand-ink);line-height:1.5 }

/* confide chat */
.chat{ display:flex; flex-direction:column; gap:12px; padding:6px 0 12px; min-height:120px }
.msg{ max-width:80%; padding:12px 14px; border-radius:18px; font-size:13.5px; line-height:1.55; animation:rise .4s var(--ease) }
.msg.me{ align-self:flex-end; background:linear-gradient(145deg,var(--brand-2),var(--brand)); color:#fff; border-bottom-right-radius:6px }
.msg.bot{ align-self:flex-start; background:#fff; border:1px solid var(--line-2); color:var(--ink); border-bottom-left-radius:6px; box-shadow:var(--sh-1) }
.msg.bot .who{ display:flex;align-items:center;gap:7px; font-size:11px;font-weight:800;color:var(--coral-ink); margin-bottom:6px }
.exits{ display:flex; gap:8px; flex-wrap:wrap; margin-top:4px }
.exits button{ font-size:12px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);
  border-radius:13px;padding:9px 13px;cursor:pointer;transition:.15s }
.exits button:active{ transform:scale(.95) }
.chatbar{ display:flex; gap:8px; align-items:center; padding:8px 0 2px; position:sticky; bottom:0; background:#fbfbf9 }
.chatbar input{ flex:1; border:1.5px solid var(--line); border-radius:16px; padding:13px 15px; font:inherit; font-size:15px; outline:0 }
.chatbar button{ width:46px;height:46px;border-radius:15px;border:0;background:var(--brand);color:#fff;display:grid;place-items:center;cursor:pointer;flex:none }

/* breathing */
.breathe-full{ position:absolute; inset:0; background:linear-gradient(180deg,#0f2b25,#08201b); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px }
.breathe-full .close-x{ position:absolute; top:22px; right:22px; color:rgba(255,255,255,.6); background:none;border:0;cursor:pointer }
.bcircle{ width:210px;height:210px;border-radius:50%; display:grid;place-items:center; position:relative; margin:20px 0;
  background:radial-gradient(circle at 40% 35%, rgba(255,255,255,.25), rgba(255,255,255,.04));
  box-shadow:0 0 60px rgba(76,182,143,.35), inset 0 0 40px rgba(255,255,255,.12); transition:transform 4s ease-in-out }
.bcircle::before{ content:""; position:absolute; inset:-24px; border-radius:50%; border:1px solid rgba(255,255,255,.12) }
.bphase{ font-size:22px; font-weight:800; letter-spacing:.05em }
.bcount{ font-family:var(--serif); font-size:64px; font-weight:500; line-height:1 }
.bhint{ font-size:13px; color:rgba(255,255,255,.65); margin-top:26px; line-height:1.6 }
.sound-row{ display:flex; gap:10px; margin-top:18px }
.sound-row button{ font-size:12px;font-weight:700; background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.15);
  border-radius:12px; padding:9px 14px; cursor:pointer }
.sound-row button.on{ background:rgba(255,255,255,.9); color:#0f2b25; border-color:transparent }

/* review card */
.rev-top{ background:linear-gradient(145deg,#f3f8f5,#fff); border:1px solid var(--line-2); border-radius:var(--r); padding:16px; margin-bottom:16px }
.rev-top .mini-dial{ display:flex; align-items:center; gap:14px }
.rev-neutral{ font-size:13px; color:var(--ink-2); text-align:center; margin-top:12px; font-weight:600 }
.mood-bubbles{ display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 4px }
.mb{ font-size:13px;font-weight:700;padding:10px 15px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s }
.mb.on{ border-color:var(--brand); background:#eef6f2; color:var(--brand-ink) }
.slider-row{ margin:14px 0 }
.slider-row .lab{ display:flex; justify-content:space-between; font-size:12.5px; font-weight:700; margin-bottom:9px }
.slider-row .lab b{ color:var(--brand-ink) }
input[type=range]{ -webkit-appearance:none; width:100%; height:8px; border-radius:5px; background:linear-gradient(90deg,var(--c,var(--brand)) var(--fill,50%), rgba(35,48,41,.09) var(--fill,50%)); outline:0 }
input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(35,48,41,.25), 0 0 0 2px var(--c,var(--brand)); cursor:pointer }
input[type=range]::-moz-range-thumb{ width:24px;height:24px;border:0;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(35,48,41,.25), 0 0 0 2px var(--c,var(--brand)); cursor:pointer }
/* review sliders */
.rv-sliders{ display:flex; flex-direction:column; gap:18px; margin:4px 0 8px }
.rv-sl-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px }
.rv-sl-head span{ font-size:13.5px; font-weight:700; color:var(--ink) }
.rv-sl-d{ font-size:13px; font-weight:800; font-family:var(--serif) }
.rv-sl-ends{ display:flex; justify-content:space-between; margin-top:7px; font-size:10.5px; color:var(--ink-3) }
.stars{ display:flex; gap:8px; margin:2px 0 }
.stars button{ background:none;border:0;cursor:pointer;color:var(--line);padding:2px }
.stars button.on{ color:var(--gold) }
.stars svg{ width:32px;height:32px }

/* weekly report */
.rep-tabs{ display:flex; gap:8px; margin-bottom:14px }
.rep-tab{ flex:1; padding:12px; border-radius:16px; border:1.5px solid var(--line); background:#fff; cursor:pointer; text-align:left; transition:.18s }
.rep-tab.on{ border-color:transparent; color:#fff }
.rep-tab.on.a{ background:linear-gradient(145deg,#5a6cc4,#6d7fd1) }
.rep-tab.on.b{ background:linear-gradient(145deg,var(--brand-2),var(--brand)) }
.rep-tab b{ font-size:13px;font-weight:800;display:block }
.rep-tab span{ font-size:10.5px; display:block; margin-top:3px; opacity:.75 }
.rep-body{ background:#fff; border:1px solid var(--line-2); border-radius:var(--r); padding:18px; box-shadow:var(--sh-1) }
.rep-body h4{ font-size:15px; font-weight:800; margin:16px 0 8px } .rep-body h4:first-child{ margin-top:0 }
.rep-line{ display:flex; align-items:center; gap:9px; font-size:13px; padding:7px 0; color:var(--ink-2) }
.rep-line .ck{ width:18px;height:18px;border-radius:6px;background:#eaf6f1;display:grid;place-items:center;flex:none;color:var(--brand-ink) }
.rep-badge{ display:inline-flex;align-items:center;gap:6px; font-size:11px;font-weight:700; background:#eef0f8;color:#5a68b0;
  padding:6px 11px;border-radius:999px; margin-bottom:12px }
.bars{ display:flex; align-items:flex-end; gap:8px; height:100px; margin:10px 0 }
.bars .b{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; justify-content:flex-end; height:100% }
.bars .b .bar{ width:100%; border-radius:8px 8px 4px 4px; background:linear-gradient(var(--brand-2),var(--brand)) }
.bars .b span{ font-size:10px; color:var(--ink-3); font-weight:700 }

/* dressup */
.stage-char{ display:grid; place-items:center; padding:18px 0 6px }
.stage-char .disc{ width:210px;height:150px;border-radius:26px; display:grid;place-items:center;
  background:radial-gradient(circle at 50% 120%, #eaf6f1, #f6f7f4); }
.stage-char .disc svg{ width:130px;height:130px; overflow:visible }
.pt-bal{ display:inline-flex;align-items:center;gap:7px; background:#fdf6ec;color:#b58324;border:1px solid #f2e2c4;
  padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:800; }
.wardrobe{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px }
.gear{ background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;transition:.15s }
.gear.on{ border-color:var(--brand); background:#eef6f2 }
.gear.lk{ opacity:.5 }
.gear .g{ font-size:26px; height:34px; display:grid;place-items:center }
.gear b{ font-size:11px;font-weight:700; display:block; margin-top:4px }
.gear span{ font-size:10px;color:var(--ink-3); display:flex;align-items:center;gap:3px;justify-content:center;margin-top:2px }

/* toast */
.toast{ position:absolute; left:20px; right:20px; bottom:112px; z-index:95; background:#1c2b25; color:#fff;
  border-radius:16px; padding:13px 16px; font-size:13px; font-weight:600; box-shadow:0 12px 30px rgba(0,0,0,.3);
  display:flex; align-items:center; gap:10px; transform:translateY(18px); opacity:0; transition:.32s var(--ease); pointer-events:none }
.toast.show{ transform:none; opacity:1 }
.toast .ic{ color:var(--brand-2); flex:none }

/* onboarding */
.ob{ background:linear-gradient(180deg,#f6f9f6,#fbfbf9); }
.ob-hero{ text-align:center; padding:8px 0 2px }
.ob-orb{ width:120px;height:120px;margin:6px auto; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff, rgba(255,255,255,0) 45%), conic-gradient(from 200deg, #8fd7c4, #b7c4ee, #f5c4b6, #8fd7c4);
  display:grid;place-items:center; box-shadow:0 16px 34px -10px rgba(47,158,134,.4); animation:breathe 6s ease-in-out infinite }
.ob-orb svg{ width:84px;height:84px; overflow:visible }
.ob h2.serif{ font-family:var(--serif); font-weight:500; font-size:26px; text-align:center; margin-top:10px }
.ob .tl{ text-align:center; font-size:13px; color:var(--ink-2); margin:6px 0 4px }
.persona{ display:flex; flex-direction:column; gap:10px; margin:8px 0 }
.pcard2{ display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid var(--line); border-radius:var(--r);
  padding:16px; cursor:pointer; transition:.18s; text-align:left }
.pcard2.sel{ border-color:var(--brand); box-shadow:0 0 0 3px rgba(47,158,134,.12) }
.pcard2 .ic{ width:46px;height:46px;border-radius:14px;display:grid;place-items:center;flex:none;color:#fff }
.pcard2 b{ font-size:15px;font-weight:800; display:block }
.pcard2 span{ font-size:11.5px;color:var(--ink-3); display:block;margin-top:3px }
.ob-steps{ display:flex; gap:6px; justify-content:center; margin:14px 0 }
.ob-steps i{ width:7px;height:7px;border-radius:50%;background:rgba(35,48,41,.15) }
.ob-steps i.on{ background:var(--brand); width:20px; border-radius:4px }
.value-pop{ text-align:center; padding:6px 0 }
.value-pop .big{ font-family:var(--serif); font-size:22px; font-weight:500; line-height:1.4; margin:12px 0 }
.value-pop .big em{ font-style:normal; color:var(--brand-ink) }

/* misc */
.center{ text-align:center }
.mt8{ margin-top:8px } .mt12{ margin-top:12px } .mt16{ margin-top:16px } .mb4{ margin-bottom:4px }
.muted{ color:var(--ink-3) }
.hairline{ height:1px; background:var(--line-2); margin:16px 0 }
.hint-note{ font-size:11.5px; color:var(--ink-3); text-align:center; line-height:1.6; padding:4px 10px }

/* ============ FLOATING PET 雷萌萌 ============ */
.pet{ position:absolute; width:74px; height:82px; z-index:47; touch-action:none; cursor:grab;
  filter:drop-shadow(0 10px 14px rgba(20,40,32,.22)); }
.pet.dragging{ cursor:grabbing; z-index:48 }
.pet.snapping{ transition:left .5s var(--spring), top .3s var(--ease) }
.pet__char{ width:100%; height:100%; position:relative; animation:petbob 3.4s var(--ease) infinite; transform-origin:50% 88% }
.pet.dragging .pet__char{ animation:none; transform:scale(1.07) }
.pet__char svg{ width:100%; height:100%; overflow:visible; display:block }
@keyframes petbob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-5px) } }
.pet__char.act-hop{ animation:pethop .85s var(--spring) }
@keyframes pethop{ 0%{transform:translateY(0) scaleY(1)} 22%{transform:translateY(2px) scaleY(.9)} 55%{transform:translateY(-17px) scaleY(1.08)} 82%{transform:translateY(0) scaleY(.95)} 100%{transform:translateY(0) scaleY(1)} }
.pet__char.act-wiggle{ animation:petwig .7s var(--ease) }
@keyframes petwig{ 0%,100%{transform:rotate(0)} 20%{transform:rotate(-9deg)} 52%{transform:rotate(8deg)} 78%{transform:rotate(-4deg)} }
.pet__char.act-spin{ animation:petspin .95s var(--ease) }
@keyframes petspin{ 0%{transform:perspective(340px) rotateY(0)} 100%{transform:perspective(340px) rotateY(360deg)} }
.p-eyes{ transform-box:fill-box; transform-origin:center; animation:petblink 4.8s infinite }
@keyframes petblink{ 0%,90%,100%{ transform:scaleY(1) } 94%{ transform:scaleY(.12) } }
.act-wave .p-arm-r{ animation:petwave .85s ease; transform-box:fill-box; transform-origin:top center }
@keyframes petwave{ 0%,100%{transform:rotate(0)} 25%{transform:rotate(-30deg)} 50%{transform:rotate(-10deg)} 75%{transform:rotate(-26deg)} }
.act-look .p-eyes{ animation:petlook 1.1s ease }
@keyframes petlook{ 0%,100%{transform:translateX(0)} 35%{transform:translateX(-3px)} 70%{transform:translateX(3px)} }
.pet__bubble{ position:absolute; right:66px; bottom:14px; max-width:186px; width:max-content;
  background:#fff; border:1px solid var(--line-2); box-shadow:var(--sh-2); border-radius:16px 16px 4px 16px;
  padding:11px 13px; opacity:0; transform:translateX(6px) scale(.9); transform-origin:bottom right;
  transition:opacity .3s var(--ease), transform .34s var(--spring); pointer-events:none }
.pet__bubble.show{ opacity:1; transform:none; pointer-events:auto }
.pet__bubble p{ font-size:12.5px; line-height:1.55; color:var(--ink-2) }
.pet__bubble .qa{ display:flex; gap:6px; margin-top:9px; flex-wrap:wrap }
.pet__bubble .qa button{ font-size:11.5px; font-weight:700; border:0; cursor:pointer; padding:7px 11px; border-radius:11px; background:#eef6f2; color:var(--brand-ink) }
.pet.dock-left .pet__bubble{ right:auto; left:66px; border-radius:16px 16px 16px 4px; transform-origin:bottom left }

/* orb number gauge */
.orb-num{ text-align:center }
.orb-num b{ font-family:var(--serif); font-size:54px; font-weight:500; line-height:1; display:block }
.orb-num span{ font-size:11px; font-weight:800; letter-spacing:.16em; color:var(--ink-3); margin-top:5px; display:block }

/* ============ FULL-PAGE ADD ============ */
.addpage{ position:absolute; inset:0; background:#fbfbf9; display:flex; flex-direction:column }
.addbar{ display:flex; align-items:center; gap:10px; padding:52px 18px 12px; border-bottom:1px solid var(--line-2); background:#fbfbf9; flex:none }
.ab-btn{ width:38px;height:38px;border-radius:12px;border:0;background:rgba(35,48,41,.06);color:var(--ink);display:grid;place-items:center;cursor:pointer;transition:transform .12s }
.ab-btn:active{ transform:scale(.92) }
.ab-title{ flex:1; text-align:center; font-size:16px; font-weight:800 }
.ab-mic{ background:linear-gradient(145deg,var(--brand-2),var(--brand)); color:#fff }
.addbody{ flex:1; overflow-y:auto; padding:18px 18px 22px }
.addbody::-webkit-scrollbar{ width:0 }
.addfoot{ padding:12px 18px calc(20px + env(safe-area-inset-bottom)); border-top:1px solid var(--line-2); background:#fbfbf9; flex:none }
.bigfield{ background:#fff; border:1.5px solid var(--line); border-radius:18px; padding:16px; margin-bottom:6px }
.bigfield input{ width:100%; border:0; outline:0; font:inherit; font-size:19px; font-weight:700; color:var(--ink); background:none }
.bigfield input::placeholder{ color:var(--ink-3); font-weight:600 }
.ai-hint{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--brand-ink); font-weight:700; padding:2px 4px 4px }
.fsec{ margin-top:18px }
.fsec>.lab{ font-size:12.5px; font-weight:800; color:var(--ink-2); margin:0 2px 11px; display:flex; align-items:center; gap:7px }
.fsec>.lab .opt{ margin-left:auto; font-size:11px; color:var(--ink-3); font-weight:600 }
.chips{ display:flex; gap:8px; flex-wrap:wrap }
.chip2{ border:1.5px solid var(--line); background:#fff; color:var(--ink-2); font:inherit; font-size:13px; font-weight:700;
  padding:9px 13px; border-radius:13px; cursor:pointer; transition:transform .14s var(--ease), border-color .2s, box-shadow .2s, background .2s; display:inline-flex; align-items:center; gap:6px }
.chip2:active{ transform:scale(.95) }
.chip2.on{ border-color:transparent; background:linear-gradient(150deg,#f1f8f5,#e5f2eb); color:var(--brand-ink); box-shadow:inset 0 0 0 1px rgba(43,147,124,.22), 0 2px 8px -3px rgba(43,147,124,.25) }
.chip2.dom.on{ background:var(--c,#eef6f2); border-color:transparent; color:#fff; box-shadow:0 4px 12px -3px color-mix(in srgb, var(--c) 55%, transparent) }
.chip2.dom.on .dot{ background:#fff !important }
.urg{ display:flex; gap:8px }
.urg button{ flex:1; border:1.5px solid var(--line); background:#fff; font:inherit; font-size:13.5px; font-weight:800;
  padding:12px; border-radius:14px; cursor:pointer; transition:.15s; display:flex; align-items:center; justify-content:center; gap:7px }
.urg button:active{ transform:scale(.97) }
.urg button .d{ width:9px;height:9px;border-radius:50% }
.urg button.on{ border-color:transparent; color:#fff }
.urg button.on .d{ background:#fff !important }
.urg button.on.u-high{ background:linear-gradient(145deg,#e97a7a,#de6e6e) }
.urg button.on.u-mid{ background:linear-gradient(145deg,#ecb559,#e6a93b) }
.urg button.on.u-low{ background:linear-gradient(145deg,#5fbf9c,#4fb68f) }
.switchrow{ display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:14px 15px }
.switchrow .sic{ width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex:none;color:#fff }
.switchrow .stx{ flex:1 } .switchrow .stx b{ font-size:14px; font-weight:700; display:block } .switchrow .stx span{ font-size:11.5px; color:var(--ink-3) }
.switch{ width:50px;height:30px;border-radius:16px;background:rgba(35,48,41,.15);position:relative;cursor:pointer;flex:none;transition:background .25s }
.switch::after{ content:""; position:absolute; top:3px; left:3px; width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:left .25s var(--spring) }
.switch.on{ background:var(--brand) } .switch.on::after{ left:23px }
.subopts{ margin-top:0; overflow:hidden; max-height:0; opacity:0; transition:max-height .3s var(--ease), opacity .3s var(--ease), margin-top .3s var(--ease) }
.subopts.show{ max-height:70px; opacity:1; margin-top:10px }
.tagbox{ background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:13px 14px }
.tagbox textarea{ width:100%; border:0; outline:0; font:inherit; font-size:14px; line-height:1.5; color:var(--ink); background:none; resize:none; min-height:22px }
.tag-in{ display:flex; gap:8px; flex-wrap:wrap; margin-top:11px; align-items:center }
.tag-chip{ font-size:12px; font-weight:700; background:#eef6f2; color:var(--brand-ink); padding:7px 10px; border-radius:10px; display:inline-flex; align-items:center; gap:5px }
.tag-chip .x{ cursor:pointer; opacity:.55; display:inline-flex }
.tag-input-inline{ border:1.5px dashed var(--line); border-radius:10px; padding:7px 10px; font:inherit; font-size:12.5px; width:88px; outline:0; color:var(--ink) }
.tag-sug{ font-size:11.5px; font-weight:700; border:1px solid var(--line-2); background:#fff; color:var(--ink-3); padding:7px 10px; border-radius:10px; cursor:pointer }

/* task-row extra badges */
.badge.urg-high{ background:#fdecec; color:#c65a5a }
.badge.urg-mid{ background:#fdf3e3; color:#b8892f }
.badge.focus{ background:#fdf6ec; color:#b58324 }
.badge.rep{ background:#eef0f8; color:#5a68b0 }
.badge.doing-b{ background:#e6f5ef; color:var(--brand-ink) }
.t-tags{ display:inline-flex; gap:5px; flex-wrap:wrap }
.t-tag{ font-size:10.5px; font-weight:700; color:var(--ink-3); background:rgba(35,48,41,.05); padding:3px 7px; border-radius:6px }
.task .body{ cursor:pointer }
.task.doing{ box-shadow:inset 3px 0 0 var(--brand) }
.t-go{ flex:none; width:40px; height:40px; border-radius:12px; border:0; cursor:pointer; display:grid; place-items:center;
  background:linear-gradient(145deg,var(--brand-2),var(--brand)); color:#fff; box-shadow:0 4px 10px rgba(47,158,134,.28); transition:transform .12s }
.t-go:active{ transform:scale(.9) }
.task.done .t-go{ display:none }

/* home topic cards + back row */
.topic-card{ display:flex; align-items:center; gap:12px; width:100%; margin-top:10px; padding:14px 15px; border:1.5px solid var(--line); border-radius:18px; background:#fff; cursor:pointer; text-align:left; color:var(--ink); transition:transform .12s, border-color .15s; animation:rise .5s var(--ease) both }
.topic-card:active{ transform:scale(.985) }
.topic-card .tc-ic{ width:40px; height:40px; border-radius:13px; display:grid; place-items:center; color:#fff; flex:none }
.topic-card .tc-tx{ flex:1 } .topic-card .tc-tx b{ font-size:14px; display:block } .topic-card .tc-tx span{ font-size:11.5px; color:var(--ink-3) }
.backrow{ display:inline-flex; align-items:center; gap:2px; border:0; background:none; color:var(--ink-3); font:inherit; font-size:13px; font-weight:700; cursor:pointer; padding:2px 6px 10px 0; margin-left:-4px }

/* task detail sheet */
.td-head h2{ font-size:20px; line-height:1.3 }
.td-meta{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px }
.td-meta .dv{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--ink-2); background:rgba(35,48,41,.045); padding:6px 10px; border-radius:10px }
.td-note{ margin-top:12px; font-size:13px; line-height:1.55; color:var(--ink-2); background:#faf9f5; border:1px solid var(--line-2); border-radius:12px; padding:11px 13px }
.td-acts{ margin-top:18px; display:flex; flex-direction:column; gap:10px }
.td-row{ display:flex; gap:8px } .td-row .btn{ flex:1; padding:12px 6px }

/* focus timer */
.focuspage{ position:absolute; inset:0; background:#fbfbf9; display:flex; flex-direction:column; align-items:center; padding:52px 22px calc(24px + env(safe-area-inset-bottom)) }
.fx-top{ display:flex; align-items:center; width:100%; gap:10px } .fx-top .fx-title{ flex:1; text-align:center; font-weight:800; font-size:15px }
.fx-task{ margin:22px 0 8px; font-size:16px; display:flex; align-items:center; gap:8px; text-align:center; max-width:100%; line-height:1.4 } .fx-task b{ font-weight:700 }
.fx-ring{ position:relative; margin-top:14px; display:grid; place-items:center }
.fx-ring .fx-time{ position:absolute; text-align:center } .fx-ring .fx-time b{ font-family:var(--serif); font-size:52px; font-weight:500; line-height:1; display:block; color:var(--ink) }
.fx-ring .fx-time span{ font-size:12px; color:var(--ink-3); font-weight:700; margin-top:8px; display:block }
.fx-controls{ display:flex; align-items:center; gap:18px; margin-top:34px }
.fx-mini{ min-width:66px; padding:12px 10px; border-radius:14px; border:1.5px solid var(--line); background:#fff; font:inherit; font-size:13px; font-weight:800; color:var(--ink-2); cursor:pointer }
.fx-mini:active{ transform:scale(.95) }
.fx-play{ width:74px; height:74px; border-radius:50%; border:0; cursor:pointer; display:grid; place-items:center; color:#fff;
  background:linear-gradient(145deg,var(--brand-2),var(--brand)); box-shadow:0 10px 22px rgba(47,158,134,.34) }
.fx-play:active{ transform:scale(.94) }
.fx-help{ display:flex; gap:10px; margin-top:28px; flex-wrap:wrap; justify-content:center }
.fx-help button{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line-2); background:#fff; color:var(--ink-2); font:inherit; font-size:12.5px; font-weight:700; padding:9px 13px; border-radius:12px; cursor:pointer }

/* me page */
.me-profile{ display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid var(--line); border-radius:20px; padding:16px; animation:rise .5s var(--ease) both }
.me-avatar{ width:62px; height:62px; border-radius:50%; border:0; cursor:pointer; flex:none; background:radial-gradient(circle at 40% 30%,#eafaf4,#d3f0e6); display:grid; place-items:center; overflow:hidden }
.me-avatar svg{ width:100%; height:100% }
.me-id{ flex:1; min-width:0 } .me-id>b{ font-size:18px; display:block }
.me-tag{ display:inline-block; font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:8px; margin-top:4px }
.me-stat{ font-size:11.5px; color:var(--ink-3); margin-top:7px; display:flex; align-items:center; gap:5px }
.me-edit{ width:38px; height:38px; border-radius:12px; border:0; background:rgba(35,48,41,.06); color:var(--ink-2); cursor:pointer; flex:none; display:grid; place-items:center }
.me-vip{ display:flex; align-items:center; gap:12px; width:100%; margin-top:12px; padding:15px 16px; border:0; border-radius:18px; cursor:pointer; text-align:left;
  background:linear-gradient(135deg,#2f6f5e,#3f8f78); color:#fff; box-shadow:0 10px 22px rgba(47,111,94,.28); animation:rise .5s var(--ease) both }
.me-vip.on{ background:linear-gradient(135deg,#c9962f,#e0b34c) }
.me-vip .vip-l{ display:flex; align-items:center; gap:12px; flex:1 }
.me-vip .vip-ic{ width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,.18); display:grid; place-items:center; flex:none }
.me-vip b{ font-size:15px; display:block } .me-vip span{ font-size:11.5px; opacity:.9 }
.me-vip .vip-badge{ font-size:11px; font-weight:800; background:rgba(255,255,255,.22); padding:5px 10px; border-radius:9px }
.me-sec{ font-size:12px; font-weight:800; color:var(--ink-3); letter-spacing:.04em; margin:20px 4px 9px; animation:rise .5s var(--ease) both }
.me-group{ background:#fff; border:1.5px solid var(--line); border-radius:18px; overflow:hidden; animation:rise .5s var(--ease) both }
.mrow{ display:flex; align-items:center; gap:12px; width:100%; padding:14px 15px; border:0; border-bottom:1px solid var(--line-2); background:none; cursor:pointer; text-align:left; color:var(--ink); font:inherit }
.me-group .mrow:last-child{ border-bottom:0 }
.mrow:active{ background:rgba(35,48,41,.025) }
.mrow-ic{ width:34px; height:34px; border-radius:10px; background:rgba(35,48,41,.05); color:var(--ink-2); display:grid; place-items:center; flex:none }
.mrow-tx{ flex:1; min-width:0 } .mrow-tx b{ font-size:14px; font-weight:600; display:block } .mrow-tx span{ font-size:11.5px; color:var(--ink-3) }
.mrow-val{ font-size:12.5px; color:var(--ink-3); font-weight:600; margin-right:2px }

/* membership tiers */
.tier{ border:1.5px solid var(--line); border-radius:16px; padding:15px; margin-bottom:10px }
.tier.cur{ border-color:var(--brand); background:#f4fbf8 }
.tier-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px } .tier-top b{ font-size:15px }
.tier-now{ font-size:11px; font-weight:800; color:var(--brand-ink); background:#e6f5ef; padding:3px 9px; border-radius:8px }
.tier-price{ font-size:13px; font-weight:800; color:var(--ink-2) }
.tier ul{ list-style:none; display:flex; flex-direction:column; gap:7px } .tier li{ font-size:12.5px; color:var(--ink-2); display:flex; align-items:center; gap:7px } .tier li svg{ color:var(--brand); flex:none }

/* trash / inbox rows + mini buttons */
.trash-item,.inbox-item{ display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--line-2) }
.trash-item .body,.inbox-item .body{ flex:1; min-width:0 } .trash-item .t,.inbox-item .t{ font-size:14px; font-weight:600 } .trash-item .m,.inbox-item .m{ margin-top:4px }
.mini-btns{ display:flex; gap:6px; flex:none }
.mini-btn{ font-size:12px; font-weight:700; border:1.5px solid var(--line); background:#fff; color:var(--brand-ink); padding:7px 11px; border-radius:10px; cursor:pointer }
.mini-btn.ghost{ color:var(--ink-3) } .mini-btn.danger{ color:#c65a5a; border-color:#f2d6d6 }
.empty-note{ text-align:center; color:var(--ink-3); font-size:13px; padding:26px 0 }

/* templates + privacy + picker */
.tpl-card{ display:block; width:100%; text-align:left; border:1.5px solid var(--line); border-radius:16px; padding:14px; margin-bottom:10px; background:#fff; cursor:pointer; position:relative }
.tpl-card b{ font-size:14.5px; display:block } .tpl-card span{ font-size:12px; color:var(--ink-3); display:block; margin-top:5px; line-height:1.5 }
.tpl-card .tpl-apply{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:800; color:var(--brand-ink); margin-top:10px }
.priv-block{ background:#faf9f5; border:1px solid var(--line-2); border-radius:14px; padding:13px 14px; margin-bottom:10px }
.priv-block b{ display:flex; align-items:center; gap:7px; font-size:13.5px } .priv-block p{ font-size:12.5px; color:var(--ink-2); line-height:1.55; margin-top:7px }
.picklist{ display:flex; flex-direction:column; gap:2px }
.pickrow{ display:flex; align-items:center; justify-content:space-between; padding:14px 14px; border:0; background:none; font:inherit; font-size:15px; color:var(--ink); cursor:pointer; border-radius:12px }
.pickrow.on{ background:#f4fbf8; color:var(--brand-ink); font-weight:700 } .pickrow svg{ color:var(--brand) }

/* insights: today review + focus stats */
.today-review{ background:linear-gradient(160deg,#eef7f2,#f7fbf8); border:1.5px solid #d8ece2; border-radius:20px; padding:16px; margin-bottom:6px }
.today-review.done{ background:#fff; border-color:var(--line) }
.tr-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px }
.tr-head b{ font-size:16px; display:block } .tr-head span{ font-size:11.5px; color:var(--ink-3); display:block; margin-top:2px }
.tr-remind{ flex:none; display:inline-flex; align-items:center; gap:4px; border:1px solid var(--line); background:#fff; color:var(--brand-ink); font:inherit; font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:10px; cursor:pointer; white-space:nowrap }
.tr-report{ margin-top:12px }
.tr-line{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--ink-2); background:#fff; border:1px solid var(--line-2); border-radius:12px; padding:11px 12px; line-height:1.5 }
.tr-done{ margin-top:12px } .trd{ display:flex; justify-content:space-between; align-items:center; padding:7px 2px; border-bottom:1px solid var(--line-2); font-size:13px } .trd:last-of-type{ border-bottom:0 } .trd span{ color:var(--ink-3) } .trd b{ color:var(--ink) }
.focus-stat{ display:flex; gap:10px; margin-bottom:14px }
.focus-stat .fs{ flex:1; text-align:center; background:#f4faf7; border:1px solid var(--line-2); border-radius:13px; padding:12px 6px }
.focus-stat .fs b{ font-family:var(--serif); font-size:23px; font-weight:500; color:var(--brand-ink) } .focus-stat .fs b i{ font-size:12px; font-style:normal; color:var(--ink-3) }
.focus-stat .fs span{ font-size:10.5px; color:var(--ink-3); font-weight:700; display:block; margin-top:4px }
.focus-bars{ display:flex; gap:8px; align-items:flex-end; height:76px; padding:0 2px }
.focus-bars .fb{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100% }
.focus-bars .fb-bar{ width:70%; border-radius:5px 5px 0 0; min-height:4px }
.focus-bars .fb span{ font-size:10px; color:var(--ink-3); margin-top:5px; font-weight:700 }

/* task breakdown */
.split-list{ display:flex; flex-direction:column; gap:9px }
.split-step{ display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px 14px }
.split-step.ice{ border-color:var(--brand); background:#f4fbf8 }
.ss-n{ width:26px; height:26px; border-radius:50%; background:rgba(35,48,41,.06); color:var(--ink-2); font-size:13px; font-weight:800; display:grid; place-items:center; flex:none }
.split-step.ice .ss-n{ background:var(--brand); color:#fff }
.ss-tx b{ font-size:14px; display:block } .ss-tx span{ font-size:11.5px; color:var(--ink-3) }

/* login */
.login{ padding:64px 26px 30px; min-height:100%; display:flex; flex-direction:column }
.login-brand{ text-align:center; margin-bottom:26px }
.lb-orb{ width:84px; height:84px; margin:0 auto 12px; filter:drop-shadow(0 8px 16px rgba(47,158,134,.22)) }
.lb-logo{ width:78px; height:78px; margin:0 auto 14px; filter:drop-shadow(0 10px 20px rgba(44,133,112,.28)) }
.login-brand h1{ font-size:38px; font-weight:500; letter-spacing:.18em; margin-left:.18em;
  background-image:linear-gradient(150deg, var(--brand-ink) 30%, #3f7a67 70%, #b58a3a 115%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent }
.theme-dark .login-brand h1{ background-image:linear-gradient(150deg, #d9efe4 25%, #8fcbb4 70%, #e2c079 115%) }
.login-brand p{ display:flex; align-items:center; justify-content:center; gap:10px; font-size:11.5px; color:var(--ink-3); margin-top:9px; letter-spacing:.34em; margin-left:.34em; font-weight:600 }
.login-brand p i{ width:4.5px; height:4.5px; border-radius:1px; background:var(--gold); transform:rotate(45deg); flex:none; opacity:.85 }
.lg-fibers{ position:absolute; inset:0; pointer-events:none; overflow:hidden }
.lg-fibers svg{ position:absolute; inset:0; width:100%; height:100%; display:block }
.lg-fibers path{ fill:none; stroke-width:.5; stroke-linecap:round; vector-effect:non-scaling-stroke; stroke-width:1.3 }
.lg-fibers .f-a{ stroke:rgba(47,158,134,.13) }
.lg-fibers .f-b{ stroke:rgba(201,162,75,.14) }
.lg-fibers .thin{ stroke-width:.85 }
.theme-dark .lg-fibers .f-a{ stroke:rgba(120,205,178,.13) }
.theme-dark .lg-fibers .f-b{ stroke:rgba(226,192,121,.14) }
.lg-fibers svg{ animation:fibDrift 22s ease-in-out infinite; transform-origin:50% 50% }
@keyframes fibDrift{ 0%,100%{ transform:translate3d(0,0,0) scale(1.02) } 50%{ transform:translate3d(-3%,2%,0) scale(1.06) } }
.lg-fibers path{ transform-box:fill-box; transform-origin:center }
.lg-fibers .d1{ animation:fibA 15s ease-in-out infinite }
.lg-fibers .d2{ animation:fibB 19s ease-in-out infinite }
.lg-fibers .d3{ animation:fibA 17s ease-in-out infinite reverse }
.lg-fibers .d4{ animation:fibB 23s ease-in-out infinite }
.lg-fibers .d5{ animation:fibA 21s ease-in-out infinite reverse }
@keyframes fibA{ 0%,100%{ transform:translate(0,0) scaleY(1) } 50%{ transform:translate(2.5%,-1.5%) scaleY(1.05) } }
@keyframes fibB{ 0%,100%{ transform:translate(0,0) scaleX(1) } 50%{ transform:translate(-2%,1.5%) scaleX(1.06) } }
@media (prefers-reduced-motion:reduce){ .lg-fibers svg,.lg-fibers path{ animation:none } }
/* 缓缓游走的光晕，强化"活着"的动感 */
.login::before{ animation:orbA 20s ease-in-out infinite }
.login::after{ animation:orbB 26s ease-in-out infinite }
.login-card{ background:#fff; border:1px solid var(--line); border-radius:22px; padding:20px 18px; box-shadow:0 10px 30px rgba(35,48,41,.06) }
.lf{ display:flex; align-items:center; gap:10px; border:1.5px solid var(--line); border-radius:14px; padding:0 14px; height:50px; margin-bottom:11px }
.lf:focus-within{ border-color:var(--brand) }
.lf .lf-pre{ font-size:14px; font-weight:700; color:var(--ink-2); padding-right:10px; border-right:1px solid var(--line) }
.lf .lf-ic{ color:var(--ink-3); display:flex }
.lf input{ flex:1; border:0; outline:0; font:inherit; font-size:15px; background:none; color:var(--ink) }
.lf .lf-code{ border:0; background:none; color:var(--brand-ink); font:inherit; font-size:13px; font-weight:800; cursor:pointer; white-space:nowrap }
.lf .lf-code.off{ color:var(--ink-3) }
.login-div{ text-align:center; position:relative; margin:18px 0 14px } .login-div::before{ content:""; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--line-2) }
.login-div span{ position:relative; background:#fff; padding:0 12px; font-size:11.5px; color:var(--ink-3) }
.login-social{ display:flex; justify-content:center; gap:22px }
.ls{ border:0; background:none; font:inherit; font-size:11px; color:var(--ink-3); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px }
.ls-ic{ width:48px; height:48px; border-radius:50%; display:grid; place-items:center; color:#fff }
.login-guest{ margin:22px auto 0; border:0; background:none; font:inherit; font-size:14px; font-weight:700; color:var(--brand-ink); cursor:pointer; display:inline-flex; align-items:center; gap:5px }
.login-agree{ display:flex; align-items:center; gap:8px; justify-content:center; margin-top:auto; padding-top:22px; font-size:11.5px; color:var(--ink-3); cursor:pointer }
.login-agree b{ color:var(--brand-ink); font-weight:700 }
.lchk{ width:17px; height:17px; border-radius:50%; border:1.5px solid var(--line); flex:none; transition:.15s; position:relative }
.lchk.on{ background:var(--brand); border-color:var(--brand) } .lchk.on::after{ content:""; position:absolute; left:5px; top:2.5px; width:4px; height:8px; border:2px solid #fff; border-top:0; border-left:0; transform:rotate(45deg) }

/* permissions */
.perm-list{ display:flex; flex-direction:column; gap:11px; margin-top:22px }
.perm{ display:flex; align-items:center; gap:13px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:15px }
.perm-ic{ width:42px; height:42px; border-radius:12px; background:#eef6f2; color:var(--brand-ink); display:grid; place-items:center; flex:none }
.perm-tx{ flex:1 } .perm-tx b{ font-size:14.5px; display:block } .perm-tx span{ font-size:11.5px; color:var(--ink-3); line-height:1.45; display:block; margin-top:3px }

/* inbox entries + sketch */
.inbox-entries{ display:grid; grid-template-columns:1fr 1fr; gap:8px }
.ib-entry{ display:flex; gap:9px; align-items:center; background:#fff; border:1px solid var(--line-2); border-radius:13px; padding:11px }
.ib-entry .ib-ic{ width:32px; height:32px; border-radius:9px; color:#fff; display:grid; place-items:center; flex:none }
.ib-entry b{ font-size:12px; display:block } .ib-entry span{ font-size:10px; color:var(--ink-3); line-height:1.35; display:block; margin-top:2px }
.sketch-wrap{ position:relative; background:#fcfbf7; border:1.5px dashed var(--line); border-radius:16px; overflow:hidden; margin-bottom:8px }
.sketch-wrap canvas{ display:block; width:100%; height:auto; touch-action:none; cursor:crosshair }
.sk-hint{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px; font-size:12.5px; color:var(--ink-3); pointer-events:none; line-height:1.6 }
.sk-tools{ display:flex; gap:8px }
.scan-stage{ background:#20272a; border-radius:16px; height:180px; display:grid; place-items:center; margin-bottom:10px; position:relative; overflow:hidden }
.scan-stage.shot{ background:#2a3a34 }
.scan-frame{ color:rgba(255,255,255,.75); display:flex; flex-direction:column; align-items:center; gap:8px; font-size:12px }
.scan-frame::before,.scan-frame::after{ content:""; position:absolute; width:34px; height:34px; border:2px solid rgba(255,255,255,.5) }
.scan-frame::before{ top:16px; left:16px; border-right:0; border-bottom:0; border-radius:6px 0 0 0 }
.scan-frame::after{ bottom:16px; right:16px; border-left:0; border-top:0; border-radius:0 0 6px 0 }

/* dependency chain builder */
.chain-cta{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; border:1.5px solid var(--brand); background:linear-gradient(150deg,#f4fbf8,#eef7f2); border-radius:16px; padding:15px; cursor:pointer; margin-bottom:16px; color:var(--ink) }
.cc-ic{ width:42px; height:42px; border-radius:12px; background:var(--brand); color:#fff; display:grid; place-items:center; flex:none }
.cc-tx{ flex:1 } .cc-tx b{ font-size:15px; display:block } .cc-tx span{ font-size:12px; color:var(--ink-3); display:block; margin-top:2px }
.chain-cta>svg{ color:var(--brand-ink) }
.cb-step{ display:flex; align-items:center; gap:8px; margin-bottom:8px }
.cb-move{ display:flex; flex-direction:column; gap:1px; flex:none }
.cb-up,.cb-dn{ width:24px; height:19px; border:1px solid var(--line); background:#fff; color:var(--ink-3); display:grid; place-items:center; cursor:pointer; padding:0 }
.cb-up{ border-radius:8px 8px 0 0; transform:none } .cb-up svg{ transform:rotate(-90deg) }
.cb-dn{ border-radius:0 0 8px 8px; border-top:0 } .cb-dn svg{ transform:rotate(90deg) }
.cb-up:disabled,.cb-dn:disabled{ opacity:.3; cursor:default }
.cb-n{ width:24px; height:24px; border-radius:50%; background:var(--brand); color:#fff; font-size:12px; font-weight:800; display:grid; place-items:center; flex:none }
.cb-in{ flex:1; min-width:0; border:1.5px solid var(--line); border-radius:11px; padding:10px 12px; font:inherit; font-size:13.5px; outline:0 } .cb-in:focus{ border-color:var(--brand) }
.cb-est{ flex:none; border:1.5px solid var(--line); background:#fff; color:var(--ink-2); font:inherit; font-size:12px; font-weight:700; padding:8px 9px; border-radius:10px; cursor:pointer; min-width:38px }
.cb-x{ width:30px; height:30px; border-radius:9px; border:0; background:rgba(35,48,41,.05); color:var(--ink-3); display:grid; place-items:center; cursor:pointer; flex:none }

/* dependency chain builder */
.cb-tip{ display:flex; align-items:flex-start; gap:7px; background:#f4faf7; border:1px solid #d8ece2; border-radius:11px; padding:9px 11px; font-size:12px; color:var(--ink-2); line-height:1.5; margin-bottom:12px } .cb-tip>svg{ color:var(--brand-ink); flex:none; margin-top:2px }
.cb-main{ flex:1; min-width:0 }
.cb-attrs{ display:flex; gap:6px; margin-top:6px }
.cb-attr{ display:inline-flex; align-items:center; gap:4px; border:1px solid var(--line); background:#fbfbf9; color:var(--ink-2); font:inherit; font-size:11.5px; font-weight:700; padding:5px 9px; border-radius:9px; cursor:pointer } .cb-attr>svg{ color:var(--ink-3) }
.cb-attr.day{ border-color:rgba(43,147,124,.35); background:#f4fbf8; color:var(--brand-ink) } .cb-attr.day>svg{ color:var(--brand-ink) }
/* decomposition groups (拆解页) */
.dgroup{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:15px; margin-bottom:12px }
.dg-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px }
.dg-head b{ font-size:15px; display:block } .dg-head span{ font-size:11.5px; color:var(--ink-3); display:block; margin-top:2px }
.dg-pct{ font-family:var(--serif); font-size:20px; font-weight:500; color:var(--brand-ink); flex:none }
.dg-bar{ height:5px; border-radius:3px; background:rgba(35,48,41,.07); overflow:hidden; margin:10px 0 12px } .dg-bar i{ display:block; height:100%; border-radius:3px; background:linear-gradient(90deg,var(--brand-2),var(--brand)) }
.dstep{ display:flex; align-items:center; gap:11px; padding:4px 0; cursor:pointer }
.dstep>svg{ color:var(--ink-3); flex:none }
.ds-rail{ position:relative; width:24px; flex:none; display:flex; justify-content:center }
.ds-n{ width:24px; height:24px; border-radius:50%; background:rgba(35,48,41,.06); color:var(--ink-2); font-size:12px; font-weight:800; display:grid; place-items:center; z-index:1 }
.dstep.done .ds-n{ background:var(--brand); color:#fff }
.ds-line{ position:absolute; top:24px; left:50%; width:2px; height:calc(100% + 8px); background:var(--line-2); transform:translateX(-50%) }
.ds-body{ flex:1; min-width:0; padding:5px 0 } .ds-t{ font-size:13.5px; font-weight:600 } .dstep.done .ds-t{ color:var(--ink-3); text-decoration:line-through }
.ds-m{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-3); margin-top:3px }

/* report range + templates create */
.ep-avarow{ display:flex; align-items:center; gap:14px; margin-bottom:8px }
.ep-av{ position:relative; width:64px; height:64px; border-radius:50%; border:0; cursor:pointer; background:radial-gradient(circle at 40% 30%,#eafaf4,#d3f0e6); overflow:hidden; flex:none } .ep-av svg{ width:100%; height:100% }
.ep-av-edit{ position:absolute; right:0; bottom:0; width:22px; height:22px; border-radius:50%; background:var(--brand); color:#fff; display:grid; place-items:center; border:2px solid #fff }
.rep-range{ display:flex; gap:6px; padding:8px 18px 10px; background:#fbfbf9 }
.rep-range button{ flex:1; border:1.5px solid var(--line); background:#fff; color:var(--ink-2); font:inherit; font-size:12.5px; font-weight:700; padding:8px 4px; border-radius:11px; cursor:pointer }
.rep-range button.on{ border-color:transparent; background:var(--brand); color:#fff }
.tpl-row{ display:flex; gap:8px; margin-top:10px; align-items:center }
.tpl-apply.as{ display:inline-flex; align-items:center; gap:5px; border:1.5px solid var(--brand); background:#f4fbf8; color:var(--brand-ink); font:inherit; font-size:12.5px; font-weight:800; padding:7px 13px; border-radius:11px; cursor:pointer }
.tpl-del{ display:inline-flex; align-items:center; gap:4px; border:1px solid #f2d6d6; background:#fff; color:#c65a5a; font:inherit; font-size:12px; font-weight:700; padding:7px 11px; border-radius:11px; cursor:pointer }
.ct-step{ display:flex; align-items:center; gap:9px; margin-bottom:8px }
.ct-step input{ flex:1; border:1.5px solid var(--line); border-radius:12px; padding:11px 13px; font:inherit; font-size:14px; outline:0 } .ct-step input:focus{ border-color:var(--brand) }
.ct-x{ width:32px; height:32px; border-radius:10px; border:0; background:rgba(35,48,41,.05); color:var(--ink-3); display:grid; place-items:center; cursor:pointer; flex:none }

/* home quick-log + board intro */
.quickies{ display:flex; flex-wrap:nowrap; gap:8px; overflow-x:auto; padding-bottom:4px; margin:0 -20px; padding-left:20px; padding-right:20px; animation:rise .5s var(--ease) both }
.quickies::-webkit-scrollbar{ display:none }
.quickies .qk{ flex:none }
.qk{ display:inline-flex; align-items:center; gap:6px; border:1.5px solid var(--line); background:#fff; color:var(--ink); font:inherit; font-size:13px; font-weight:600; padding:9px 13px; border-radius:13px; cursor:pointer; transition:transform .12s }
.qk:active{ transform:scale(.94) } .qk-dot{ width:7px; height:7px; border-radius:50% }
.qk-tpl{ color:var(--brand-ink); border-color:#cdeee1; background:#f4fbf8 }
.board-intro{ background:#eef4fb; border:1px solid #d6e3f2; border-radius:14px; padding:13px 14px; margin-bottom:12px }
.board-intro b{ display:flex; align-items:center; gap:6px; font-size:13.5px; color:#41598a } .board-intro p{ font-size:12.5px; color:var(--ink-2); line-height:1.6; margin-top:7px } .board-intro p b{ display:inline; color:var(--ink) }

/* month calendar */
.mcal{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:14px 12px 10px; margin-bottom:6px }
.mc-head{ display:flex; align-items:center; justify-content:space-between; padding:0 6px 10px } .mc-head b{ font-size:15px }
.mc-nav{ width:32px; height:32px; border-radius:10px; border:0; background:rgba(35,48,41,.05); color:var(--ink-2); display:grid; place-items:center; cursor:pointer } .mc-nav.prev{ transform:scaleX(-1) }
.mc-wk{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px } .mc-wk span{ text-align:center; font-size:10.5px; color:var(--ink-3); font-weight:700 }
.mc-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px }
.mc-cell{ aspect-ratio:1; border:0; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; border-radius:11px; position:relative }
.mc-cell.mut{ pointer-events:none } .mc-cell .mc-n{ font-size:13px; font-weight:600; color:var(--ink) }
.mc-cell.past .mc-n{ color:var(--ink-3); opacity:.45 }
.mc-cell.today .mc-n{ color:var(--brand-ink); font-weight:800 }
.mc-cell.on{ background:linear-gradient(160deg,var(--brand-2),var(--brand)) } .mc-cell.on .mc-n{ color:#fff }
.mc-dot{ width:5px; height:5px; border-radius:50% }
.mc-dot.l0{ background:var(--ink-3); opacity:.3 } .mc-dot.l1{ background:#7fca8f } .mc-dot.l2{ background:#e6b84b } .mc-dot.l3{ background:#e2915a } .mc-dot.l4{ background:#de6e6e }
.mc-cell.on .mc-dot{ background:rgba(255,255,255,.9) !important }
.mc-legend{ display:flex; gap:12px; justify-content:center; margin-top:10px; padding-top:9px; border-top:1px solid var(--line-2) }
.mc-legend span{ display:inline-flex; align-items:center; gap:4px; font-size:10px; color:var(--ink-3) }
.mc-toggle{ display:flex; align-items:center; justify-content:center; gap:5px; width:100%; border:0; background:none; color:var(--ink-3); font:inherit; font-size:12px; font-weight:700; padding:12px 0 4px; margin-top:6px; border-top:1px solid var(--line-2); cursor:pointer }
.mc-toggle.up svg{ transform:rotate(-90deg) } .mc-toggle:not(.up) svg{ transform:rotate(90deg) }
.mcal.collapsed{ padding:0 }
.mcal.collapsed .mc-toggle{ justify-content:space-between; padding:15px 16px; margin-top:0; border-top:0; color:var(--ink) }
.mc-tg-l{ display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:600 } .mc-tg-l b{ color:var(--brand-ink) }
.mc-tg-r{ display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:700; color:var(--brand-ink) }

/* parsed-card actions (voice) */
.pcard-acts{ display:flex; gap:8px; justify-content:flex-end; margin-top:10px; padding-top:10px; border-top:1px solid var(--line-2) }
.pe-btn{ display:inline-flex; align-items:center; gap:4px; border:1px solid var(--line); background:#fff; color:var(--ink-2); font:inherit; font-size:11.5px; font-weight:700; padding:6px 11px; border-radius:10px; cursor:pointer }
.pe-btn.del{ color:#c65a5a; border-color:#f2d6d6 }

/* full-page chat (树洞) */
.chatpage{ position:absolute; inset:0; background:linear-gradient(180deg,#f3f8f5,#fbfbf9); display:flex; flex-direction:column }
.cp-top{ display:flex; align-items:center; gap:10px; padding:46px 16px 12px; border-bottom:1px solid var(--line-2); background:rgba(255,255,255,.7); backdrop-filter:blur(8px) }
.cp-id{ flex:1; display:flex; align-items:center; gap:10px } .cp-av{ width:40px; height:40px; border-radius:50%; background:radial-gradient(circle at 40% 30%,#eafaf4,#d3f0e6); display:grid; place-items:center; overflow:hidden } .cp-av svg{ width:100%; height:100% }
.cp-id b{ font-size:16px; display:block } .cp-id span{ font-size:11px; color:var(--ink-3) }
.cp-voice{ width:38px; height:38px; border-radius:12px; border:1.5px solid var(--line); background:#fff; color:var(--ink-3); display:grid; place-items:center; cursor:pointer; flex:none }
.cp-voice.on{ background:var(--brand); border-color:transparent; color:#fff }
.cp-chat{ flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:12px }
.cmsg{ display:flex; gap:8px; max-width:88%; animation:rise .35s var(--ease) }
.cmsg.me{ align-self:flex-end } .cmsg.bot{ align-self:flex-start }
.cav{ width:30px; height:30px; border-radius:50%; background:radial-gradient(circle at 40% 30%,#eafaf4,#d3f0e6); flex:none; overflow:hidden; margin-top:2px } .cav svg{ width:100%; height:100% }
.cbub{ position:relative; padding:12px 14px; border-radius:18px; font-size:14px; line-height:1.6 }
.cmsg.bot .cbub{ background:#fff; border:1px solid var(--line-2); border-bottom-left-radius:6px; color:var(--ink) }
.cmsg.me .cbub{ background:linear-gradient(160deg,var(--brand-2),var(--brand)); color:#fff; border-bottom-right-radius:6px }
.cspk{ position:absolute; right:-6px; bottom:-8px; width:24px; height:24px; border-radius:50%; border:1px solid var(--line); background:#fff; color:var(--ink-3); display:grid; place-items:center; cursor:pointer }
.cp-bar{ display:flex; align-items:center; gap:9px; padding:10px 14px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--line-2); background:#fff }
.cp-mic{ width:42px; height:42px; border-radius:50%; border:1.5px solid var(--line); background:#fff; color:var(--ink-2); display:grid; place-items:center; cursor:pointer; flex:none }
.cp-mic.rec{ background:#fdecec; border-color:#f0c9c9; color:#c65a5a; animation:micpulse 1.4s infinite }
.cp-bar input{ flex:1; border:1.5px solid var(--line); border-radius:22px; padding:12px 16px; font:inherit; font-size:14px; outline:0 } .cp-bar input:focus{ border-color:var(--brand) }
.cp-send{ width:44px; height:44px; border-radius:50%; border:0; background:linear-gradient(160deg,var(--brand-2),var(--brand)); color:#fff; display:grid; place-items:center; cursor:pointer; flex:none }
.chatpage .exits{ display:flex; gap:8px; padding:0 16px 8px; flex-wrap:wrap }
.chatpage .exits button{ border:1px solid var(--line); background:#fff; color:var(--brand-ink); font:inherit; font-size:12.5px; font-weight:700; padding:8px 13px; border-radius:14px; cursor:pointer }

/* smart scheduler */
.pcard.tappable{ position:relative; cursor:pointer; transition:transform .12s, border-color .15s }
.pcard.tappable:active{ transform:scale(.99) } .pcard.tappable:hover{ border-color:var(--brand) }
.pcard .conf{ font-size:10.5px; font-weight:800; color:var(--brand-ink); margin-left:auto } .pcard .conf.low{ color:#c9784a }
.pcard-del{ position:absolute; top:10px; right:10px; width:26px; height:26px; border-radius:50%; border:0; background:rgba(35,48,41,.06); color:var(--ink-3); display:grid; place-items:center; cursor:pointer; z-index:2 }
.pcard-del:active{ background:#fdecec; color:#c65a5a }
.pcard .top{ padding-right:30px }
.pcard-edit{ display:flex; align-items:center; gap:5px; margin-top:11px; padding-top:10px; border-top:1px dashed var(--line); font-size:11.5px; font-weight:700; color:var(--brand-ink) }
.pcard-edit svg:last-child{ margin-left:auto; color:var(--ink-3) }
.time-scroll{ display:flex; gap:7px; overflow-x:auto; padding:10px 2px 4px; margin:2px -2px 0; scrollbar-width:none }
.time-scroll::-webkit-scrollbar{ display:none }
.time-scroll .ts{ flex:none; border:1.5px solid var(--line); background:#fff; color:var(--ink-2); font:inherit; font-size:13px; font-weight:700; padding:9px 12px; border-radius:11px; cursor:pointer }
.time-scroll .ts.on{ border-color:transparent; background:linear-gradient(160deg,var(--brand-2),var(--brand)); color:#fff; box-shadow:0 5px 12px rgba(47,158,134,.28) }
/* 竖向时间轮盘 */
.wheel{ position:relative; gap:4px; justify-content:center; height:190px; margin-top:10px; overscroll-behavior:contain }
.wh-col{ width:88px; overflow-y:auto; scroll-snap-type:y mandatory; scrollbar-width:none; overscroll-behavior:contain; z-index:1;
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 26%,#000 74%,transparent); mask-image:linear-gradient(180deg,transparent,#000 26%,#000 74%,transparent) }
.wh-col::-webkit-scrollbar{ display:none }
.wh-it{ height:38px; display:grid; place-items:center; scroll-snap-align:center; font-size:17px; font-weight:600; color:var(--ink-3); font-variant-numeric:tabular-nums; cursor:pointer; transition:color .16s }
.wh-it.on{ color:var(--brand-ink); font-weight:800; font-size:21px; font-family:var(--serif) }
.wh-pad{ height:76px }
.wh-sep{ align-self:center; font-size:20px; font-weight:800; color:var(--ink-3); z-index:1 }
.wh-line{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:210px; height:38px; border-radius:12px; background:rgba(43,147,124,.07); border:1px solid rgba(43,147,124,.2); pointer-events:none }
/* ===== 深色主题 ===== */
.theme-dark{ --ink:#e6ece8; --ink-2:#b7c3bb; --ink-3:#84938b; --line:rgba(230,236,232,.13); --line-2:rgba(230,236,232,.085); --paper:#1f2a24; --paper-2:#18211c; color:var(--ink) }

.theme-dark .tabbar{ background:linear-gradient(180deg, rgba(14,22,17,0) 0%, rgba(14,22,17,.84) 34%, rgba(14,22,17,.97) 70%) }

.ledger-card{ background:#fdf6ef; border-color:#f3e0c8 }

.theme-dark .today-review{ background:linear-gradient(160deg,#1e2f27,#1a241e); border-color:rgba(64,185,155,.2) }

.smart-tip{ display:flex; align-items:center; gap:7px; margin-top:11px; background:#f4faf7; border:1px solid #d8ece2; border-radius:12px; padding:10px 12px; font-size:12px; color:var(--ink-2); line-height:1.5 }
.smart-tip>svg{ color:var(--brand-ink); flex:none } .smart-tip>span{ flex:1 }

/* intent autocomplete */

.ac-item{ display:block; width:100%; text-align:left; border:1.5px solid var(--line); background:#fff; color:var(--ink); font:inherit; font-size:13.5px; font-weight:600; padding:11px 13px; border-radius:12px; margin-bottom:7px; cursor:pointer; transition:.12s }
.ac-item:active{ transform:scale(.985) } .ac-item:hover{ border-color:var(--brand); background:#f4fbf8 }

/* rich report */
.rep-summary{ background:#f4faf7; border:1px solid #d8ece2; border-radius:14px; padding:14px }
.rep-summary.warm{ background:#fdf4ee; border-color:#f2ddc9 }

.rep-summary p{ font-size:13px; line-height:1.7; color:var(--ink-2) } .rep-summary b{ color:var(--ink) }
.rc em{ display:block; font-style:normal; font-size:10px; font-weight:800; margin-top:3px } .rc em.up{ color:#4b8a5b } .rc em.dn{ color:#c07a45 }

.rep-tabs2 .rt{ flex:1; border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:10px; cursor:pointer; text-align:left; font:inherit }

// L2-2 任务拆解:调后端 /decompose;返回 [{title, est?}],后端不可达/空 → 返回 null(调用方回退本地模板)
async function aiDecompose(title, mode){
  try{
    const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(), 12000);
    const resp=await fetch(LJ_API_BASE+'/decompose', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title, mode}), signal:ctrl.signal});
    clearTimeout(timer);
    if(!resp.ok) throw 0;
    const data=await resp.json();
    return (data && Array.isArray(data.steps) && data.steps.length) ? data.steps : null;
  }catch(e){ return null; }
}

async function aiSuggest(text){
  try{
    const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),8000);
    const resp=await fetch(LJ_API_BASE+'/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text}),signal:ctrl.signal});
    clearTimeout(timer);
    if(!resp.ok) return null;
    const d=await resp.json();
    return (d && Array.isArray(d.suggestions) && d.suggestions.length) ? d.suggestions.slice(0,3) : null;
  }catch(e){ return null; }
}
